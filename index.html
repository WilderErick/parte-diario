<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Parte Diario - Tiahuanaco</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f4f8;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px}
.card{background:#fff;border-radius:20px;padding:28px 20px;width:100%;max-width:400px;box-shadow:0 8px 32px rgba(0,0,0,.12);text-align:center}
h1{font-size:21px;font-weight:700;color:#1a202c;margin-bottom:4px}
.sub{font-size:13px;color:#718096;margin-bottom:20px}
.preview-box{width:100%;aspect-ratio:4/3;border:2px dashed #cbd5e0;border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;margin-bottom:12px;overflow:hidden;background:#f7fafc;position:relative}
.preview-box img{width:100%;height:100%;object-fit:cover;display:none}
.ph{display:flex;flex-direction:column;align-items:center;gap:8px}
.ph span{font-size:40px}.ph p{font-size:13px;color:#a0aec0}
.btn-foto{width:100%;padding:14px;border-radius:12px;font-size:15px;font-weight:600;border:none;cursor:pointer;margin-bottom:10px;background:#e2e8f0;color:#2d3748}
.btn{width:100%;padding:15px;border-radius:12px;font-size:15px;font-weight:600;border:none;cursor:pointer;margin-bottom:10px}
.primary{background:linear-gradient(135deg,#f6ad55,#ed8936);color:#fff}
.primary:disabled{opacity:.5;cursor:not-allowed}
.status{padding:12px;border-radius:10px;font-size:13px;font-weight:500;margin-bottom:12px;display:none}
.loading{background:#ebf8ff;color:#2b6cb0;display:block}
.error{background:#fff5f5;color:#c53030;display:block}
.success{background:#f0fff4;color:#276749;display:block}
.spin{display:inline-block;width:14px;height:14px;border:2px solid currentColor;border-top-color:transparent;border-radius:50%;animation:sp .7s linear infinite;vertical-align:middle;margin-right:5px}
@keyframes sp{to{transform:rotate(360deg)}}
input[type=file]{display:none}
/* Formulario oculto para POST nativo del navegador */
#frmPost{display:none}
</style>
</head>
<body>
<div class="card">
  <div style="font-size:44px;margin-bottom:8px">🏗️</div>
  <h1>Parte Diario</h1>
  <p class="sub">Tiahuanaco S.R.L.</p>

  <div class="preview-box">
    <img id="prev" alt="">
    <div class="ph" id="ph"><span>📄</span><p>La foto aparecerá aquí</p></div>
  </div>

  <button class="btn-foto" onclick="document.getElementById('inputCamara').click()">📷 Tomar foto con cámara</button>
  <button class="btn-foto" onclick="document.getElementById('inputGaleria').click()">🖼️ Elegir de galería</button>
  <input type="file" id="inputCamara" accept="image/*" capture="environment">
  <input type="file" id="inputGaleria" accept="image/*">

  <div class="status" id="status"></div>
  <button class="btn primary" id="btnOk" onclick="procesar()" disabled>🤖 Procesar con IA</button>
</div>

<!-- Formulario POST nativo — el navegador lo envía sin restricciones CORS -->
<form id="frmPost" method="POST" action="" enctype="application/x-www-form-urlencoded">
  <input type="hidden" id="fldImg" name="imageBase64" value="">
  <input type="hidden" name="action" value="processBase64">
</form>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz0hoACQf3_F9ISXq6Tg3d0vc03x6y36UgsH96ZVbmX_9XT4sigNEu5rKAuM5o-SJHY/exec";;
let b64 = null;

function manejarArchivo(e) {
  const f = e.target.files[0];
  if (!f) return;
  setStatus('loading', '<span class="spin"></span> Preparando imagen...');
  const reader = new FileReader();
  reader.onload = function(ev) {
    const img = new Image();
    img.onload = function() {
      // Comprimir a 600px calidad 0.5 — suficiente para OCR
      const c = document.createElement('canvas');
      const MAX = 600;
      let w = img.width, h = img.height;
      if (w > h && w > MAX){ h = Math.round(h*MAX/w); w = MAX; }
      else if (h > MAX)    { w = Math.round(w*MAX/h); h = MAX; }
      c.width = w; c.height = h;
      c.getContext('2d').drawImage(img, 0, 0, w, h);
      const full = c.toDataURL('image/jpeg', 0.5);
      b64 = full.replace(/^data:image\/jpeg;base64,/, '');
      document.getElementById('prev').src = full;
      document.getElementById('prev').style.display = 'block';
      document.getElementById('ph').style.display = 'none';
      document.getElementById('btnOk').disabled = false;
      const kb = Math.round(b64.length * 0.75 / 1024);
      setStatus('success', '✅ Foto lista · ' + w + 'x' + h + 'px · ' + kb + ' KB comprimida');
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(f);
}

document.getElementById('inputCamara').addEventListener('change', manejarArchivo);
document.getElementById('inputGaleria').addEventListener('change', manejarArchivo);

function setStatus(cls, msg) {
  const el = document.getElementById('status');
  el.className = 'status ' + cls;
  el.innerHTML = msg;
}

function procesar() {
  if (!b64) return;
  document.getElementById('btnOk').disabled = true;
  setStatus('loading', '<span class="spin"></span> Enviando al servidor... espera ~30 seg');

  // Usar formulario POST nativo del navegador
  // El navegador envía este formulario directamente — sin restricción CORS
  const frm = document.getElementById('frmPost');
  document.getElementById('fldImg').value = b64;
  frm.action = SCRIPT_URL;
  frm.submit();
}
</script>
</body>
</html>
